name: revert_pr1615
description: >
  Revert the FusionOptimizer algorithm changes from pytensor#1615
  ("Speedup FusionOptimizer") on top of pytensor@main.

  Restores the pre-PR#1615 backtracking/deque-based algorithm in
  elemwise.py. The scalar/basic.py changes from the same PR are NOT
  reverted as they are incompatible with the refactored Composite
  class hierarchy on main. Imports are adapted for the current
  codebase (direct imports instead of ps.X aliases).
pytensor:
  repo: pymc-devs/pytensor
  ref: main
  patches:
    - experiments/patches/revert_pr1615/0001-Revert-FusionOptimizer-algorithm-from-PR-1615.patch
pymc:
  repo: pymc-devs/pymc
  ref: v6
