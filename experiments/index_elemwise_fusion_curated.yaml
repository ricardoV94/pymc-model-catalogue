name: index_elemwise_fusion_curated
base: index_elemwise_fusion_curated_base
description: >
  Same index/Elemwise fusion comparison as index_elemwise_fusion
  (gather_scatter_fusion cb1e83df518d vs its pre-feature parent), but run
  over a curated set of models where advanced integer indexing is on the
  hot path so FuseIndexedElemwise actually fires with high op counts.
  Models picked from the per-model IndexedElemwise op-count report:
  high-count VAR/missing-data/varying-effects models plus the two proven
  winners from the default-10 run (multilevel_varying_intercept_slope_
  noncentered ~26% and bayesian_var_ireland ~7%). Linalg-dominated models
  that fire fusion but show no eval delta (lkj_cholesky, gp_marginal) are
  deliberately excluded.
pytensor:
  repo: ricardoV94/pytensor
  ref: cb1e83df518d8471015e77d1916867a94911f35d
pymc:
  repo: pymc-devs/pymc
  ref: main
models:
  - models.bayesian_var_hierarchical                       # 26 indexed ops
  - models.missing_data_chained_uniform                    # 9
  - models.missing_data_chained_normal                     # 7
  - models.mv_gaussian_random_walk                         # 7
  - models.sr15_social_network_giving_receiving            # 6
  - models.missing_data_hierarchical_team                  # 5
  - models.sr14_correlated_varying_effects                 # 4
  - models.sr18_missing_data_primates                      # 4
  - models.bayesian_var_fake                               # 3
  - models.bayesian_var_ireland                            # 3 (proven ~7%)
  - models.item_response_nba                               # 2
  - models.sr11_ordered_logistic_education                 # 2 (0r/6w)
  - models.sr13_district_urban_contraception               # 2
  - models.longitudinal_external_polynomial_gender         # 1 (4r/4w)
  - models.multilevel_varying_intercept_slope_noncentered  # 1 (proven ~26%)
smoke_test: |
  import pytensor
  import pytensor.tensor as pt
  from pytensor.compile.mode import get_mode
  from pytensor.tensor.subtensor import advanced_subtensor1
  from pytensor.tensor.rewriting.indexed_elemwise import IndexedElemwise

  s = pt.vector("s", shape=(10,))
  idx = pt.lvector("idx")
  fn = pytensor.function([s, idx], advanced_subtensor1(s, idx) * 2.0,
                         mode=get_mode("NUMBA"))
  ops = [n.op for n in fn.maker.fgraph.toposort()]
  assert any(isinstance(op, IndexedElemwise) for op in ops), (
      f"IndexedElemwise missing from fused graph; got {ops}"
  )
  print("smoke: IndexedElemwise present")
