name: pr1615_base
description: >
  Control arm for pr1615. Approximates the pre-PR state by reverting the
  FusionOptimizer algorithm changes from pytensor#1615
  ("Speedup FusionOptimizer") on top of pytensor@main, restoring the
  backtracking/deque algorithm in elemwise.py.
pytensor:
  repo: pymc-devs/pytensor
  ref: main
  patches:
    - experiments/patches/pr1615_base/0001-Revert-FusionOptimizer-algorithm-from-PR-1615.patch
pymc:
  repo: pymc-devs/pymc
  ref: v6
