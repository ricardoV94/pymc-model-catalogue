<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Experiment Comparison &mdash; pymc-model-catalogue</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #fff;
      color: #222;
      font-size: 13px;
    }
    header {
      padding: 10px 20px;
      border-bottom: 1px solid #eaeaea;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    header .meta { color: #888; font-size: 11px; }
    header .links { margin-left: auto; display: flex; gap: 12px; }
    header .links a { color: #1f77b4; text-decoration: none; font-size: 12px; }
    header .links a:hover { text-decoration: underline; }
    main { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }

    .controls {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .controls label { font-size: 12px; font-weight: 600; }
    .controls select {
      font-size: 12px; padding: 3px 6px;
      border: 1px solid #ccc; border-radius: 4px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .summary-card {
      border: 1px solid #eaeaea; border-radius: 8px;
      padding: 12px; text-align: center;
    }
    .summary-card .metric-name {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: #888; margin-bottom: 4px;
    }
    .summary-card .ratio {
      font-size: 24px; font-weight: 700;
    }
    .summary-card .detail {
      font-size: 10px; color: #888; margin-top: 2px;
    }

    .charts-section { margin-bottom: 24px; }
    .charts-section h2 {
      font-size: 13px; font-weight: 600; margin: 0 0 8px;
      border-bottom: 1px solid #eaeaea; padding-bottom: 4px;
    }
    .chart-container { height: 400px; margin-bottom: 16px; }

    table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; table-layout: fixed;
    }
    th, td {
      padding: 5px 8px; text-align: right;
      border-bottom: 1px solid #f0f0f0;
    }
    th { font-weight: 600; font-size: 11px; text-transform: uppercase;
         letter-spacing: 0.3px; color: #666; border-bottom: 2px solid #ddd;
         cursor: pointer; user-select: none; }
    th:hover { color: #222; }
    th.sort-asc::after { content: ' \25b2'; }
    th.sort-desc::after { content: ' \25bc'; }
    td:first-child, th:first-child { text-align: left; width: 220px; }
    td:first-child {
      font-family: ui-monospace, SF Mono, Menlo, monospace;
      font-size: 11px; word-break: break-all;
    }
    .good { color: #16a34a; }
    .bad { color: #dc2626; }
    .neutral { color: #888; }
    .na { color: #ccc; }
    tr:hover { background: #f9f9f9; }
    .summary-row td { font-weight: 700; border-top: 2px solid #ddd; }
  </style>
</head>
<body>
<header>
  <h1>Experiment Comparison</h1>
  <span class="meta" id="meta"></span>
  <div class="links">
    <a href="dashboard.html">timeline dashboard</a>
    <a href="./">default asv view</a>
  </div>
</header>
<main id="root">
  <div class="controls">
    <label>Base experiment:</label>
    <select id="base-select"></select>
    <label style="margin-left:12px">Compare:</label>
    <select id="compare-select"></select>
  </div>
  <div class="summary" id="summary"></div>
  <div class="charts-section" id="charts"></div>
  <table id="table"><thead></thead><tbody></tbody></table>
</main>
<script>
const PAYLOAD = {"metrics": ["track_rewrite_time", "track_compile_time", "track_n_rewrites", "time_eval"], "metric_labels": {"track_rewrite_time": "rewrite_time", "track_compile_time": "compile_time", "track_n_rewrites": "n_rewrites", "time_eval": "eval"}, "metric_units": {"track_rewrite_time": "seconds", "track_compile_time": "seconds", "track_n_rewrites": "count", "time_eval": "seconds"}, "data": {"base": {"models.BEST": {"track_compile_time": 1.676632163000022, "track_n_rewrites": 1074.0, "track_rewrite_time": 1.329070922000028, "time_eval": 7.980866308248697e-06}, "models.GLM_hierarchical_binomial_rat_tumor": {"track_compile_time": 1.2182647900000347, "track_n_rewrites": 512.0, "track_rewrite_time": 0.6542715869999256, "time_eval": 1.1176226049487301e-05}, "models.bayesian_var_ireland": {"track_compile_time": 11.697609173999922, "track_n_rewrites": 1540.0, "track_rewrite_time": 2.5302293649999683, "time_eval": 3.3249888544747484e-05}, "models_discrete.occupancy_crossbill": {"track_compile_time": 0.019974795999928574, "track_n_rewrites": 181.0, "track_rewrite_time": 0.3443867040000441, "time_eval": 2.3007790187944156e-05}, "models.eight_schools_noncentered": {"track_compile_time": 0.008950506000019232, "track_n_rewrites": 335.0, "track_rewrite_time": 0.39754651900000226, "time_eval": 3.794696422380572e-06}, "models.frailty_coxph_individual": {"track_compile_time": 3.684312996000017, "track_n_rewrites": 712.0, "track_rewrite_time": 0.8158065640000132, "time_eval": 0.00074610342857032}, "models.gp_marginal_matern52": {"track_compile_time": 0.204944337000029, "track_n_rewrites": 986.0, "track_rewrite_time": 1.4369881860000078, "time_eval": 0.0006779615666611487}, "models.lkj_cholesky_cov_mvnormal": {"track_compile_time": 0.3470446510000329, "track_n_rewrites": 1338.0, "track_rewrite_time": 1.789003647999948, "time_eval": 0.00033545841935642053}, "models.marginalized_gaussian_mixture_model": {"track_compile_time": 0.06980979299999035, "track_n_rewrites": 1151.0, "track_rewrite_time": 1.2419363939999357, "time_eval": 9.556248305170041e-05}, "models.multilevel_varying_intercept_slope_noncentered": {"track_compile_time": 0.020970562000002246, "track_n_rewrites": 673.0, "track_rewrite_time": 0.69911839100007, "time_eval": 1.3484194717547162e-05}}, "revert_pr1615": {"models.BEST": {"track_compile_time": 2.7611223700000664, "track_n_rewrites": 1166.0, "track_rewrite_time": 1.4414076620000742, "time_eval": 1.3333773869300932e-05}, "models.GLM_hierarchical_binomial_rat_tumor": {"track_compile_time": 3.2447586430000683, "track_n_rewrites": 554.0, "track_rewrite_time": 0.6694144129999131, "time_eval": 1.8430185059360358e-05}, "models.bayesian_var_ireland": {"track_compile_time": 13.397990788000016, "track_n_rewrites": 1550.0, "track_rewrite_time": 2.4023514890000115, "time_eval": 3.899690248267721e-05}, "models_discrete.occupancy_crossbill": {"track_compile_time": 0.02974198200013234, "track_n_rewrites": 186.0, "track_rewrite_time": 0.3220939329999055, "time_eval": 3.166617448673779e-05}, "models.eight_schools_noncentered": {"track_compile_time": 0.016140852999797062, "track_n_rewrites": 351.0, "track_rewrite_time": 0.3704636099998879, "time_eval": 4.679405828589756e-06}, "models.frailty_coxph_individual": {"track_compile_time": 5.7041491259999475, "track_n_rewrites": 738.0, "track_rewrite_time": 0.839910307000082, "time_eval": 0.0008815948076954345}, "models.gp_marginal_matern52": {"track_compile_time": 0.218712984999911, "track_n_rewrites": 1051.0, "track_rewrite_time": 1.5256573649999154, "time_eval": 0.0005997342941153714}, "models.lkj_cholesky_cov_mvnormal": {"track_compile_time": 0.34153542499984724, "track_n_rewrites": 1343.0, "track_rewrite_time": 1.7533657330000096, "time_eval": 0.0003329586129035717}, "models.marginalized_gaussian_mixture_model": {"track_compile_time": 0.09043790600003376, "track_n_rewrites": 1163.0, "track_rewrite_time": 1.2256175719999192, "time_eval": 0.0001330338414629473}, "models.multilevel_varying_intercept_slope_noncentered": {"track_compile_time": 0.030154478999975254, "track_n_rewrites": 689.0, "track_rewrite_time": 0.6815649410000333, "time_eval": 1.5952549409987844e-05}}}, "run_shas": {"base": "a038ad0fc5", "revert_pr1615": "a038ad0fc5"}};
const METRICS = PAYLOAD.metrics;
const METRIC_LABELS = PAYLOAD.metric_labels;
const METRIC_UNITS = PAYLOAD.metric_units;
const ALL_EXPERIMENTS = Object.keys(PAYLOAD.data).sort();

const baseSel = document.getElementById('base-select');
const compareSel = document.getElementById('compare-select');

ALL_EXPERIMENTS.forEach(e => {
  baseSel.add(new Option(e, e));
  compareSel.add(new Option(e, e));
});
if (ALL_EXPERIMENTS.includes('base')) baseSel.value = 'base';
const nonBase = ALL_EXPERIMENTS.find(e => e !== baseSel.value);
if (nonBase) compareSel.value = nonBase;

function formatValue(metric, v) {
  if (v == null || Number.isNaN(v)) return 'n/a';
  if (metric === 'track_n_rewrites') return v.toFixed(0);
  if (v < 1e-3) return (v * 1e6).toFixed(1) + ' µs';
  if (v < 1) return (v * 1e3).toFixed(0) + ' ms';
  return v.toFixed(3) + ' s';
}

function ratioClass(ratio, metric) {
  if (ratio == null) return 'na';
  // For n_rewrites, more is neutral (not inherently good/bad)
  if (metric === 'track_n_rewrites') {
    if (ratio > 1.05) return 'bad';
    if (ratio < 0.95) return 'good';
    return 'neutral';
  }
  // For time metrics, lower is better
  if (ratio > 1.05) return 'bad';
  if (ratio < 0.95) return 'good';
  return 'neutral';
}

function geoMean(values) {
  const valid = values.filter(v => v != null && v > 0 && isFinite(v));
  if (valid.length === 0) return null;
  const logSum = valid.reduce((s, v) => s + Math.log(v), 0);
  return Math.exp(logSum / valid.length);
}

function computeComparison(baseName, compareName) {
  const baseData = PAYLOAD.data[baseName] || {};
  const compareData = PAYLOAD.data[compareName] || {};
  const allModels = [...new Set([
    ...Object.keys(baseData), ...Object.keys(compareData)
  ])].sort();

  const rows = allModels.map(model => {
    const row = { model };
    METRICS.forEach(metric => {
      const bv = (baseData[model] || {})[metric];
      const cv = (compareData[model] || {})[metric];
      let ratio = null;
      if (bv != null && bv > 0 && cv != null && cv > 0) {
        ratio = cv / bv;
      }
      row[metric] = { base: bv, compare: cv, ratio };
    });
    return row;
  });

  const summary = {};
  METRICS.forEach(metric => {
    const ratios = rows.map(r => r[metric].ratio).filter(r => r != null);
    summary[metric] = geoMean(ratios);
  });

  return { rows, summary, allModels };
}

function renderSummary(summary) {
  const container = document.getElementById('summary');
  container.innerHTML = '';
  METRICS.forEach(metric => {
    const val = summary[metric];
    const card = document.createElement('div');
    card.className = 'summary-card';
    const cls = ratioClass(val, metric);
    const display = val != null ? val.toFixed(3) + 'x' : 'n/a';
    card.innerHTML = `
      <div class="metric-name">${METRIC_LABELS[metric]}</div>
      <div class="ratio ${cls}">${display}</div>
      <div class="detail">geometric mean ratio</div>`;
    container.appendChild(card);
  });
}

function renderCharts(comparison, baseName, compareName) {
  const container = document.getElementById('charts');
  container.innerHTML = '';
  METRICS.forEach(metric => {
    const models = [];
    const ratios = [];
    const colors = [];
    comparison.rows.forEach(row => {
      const r = row[metric].ratio;
      if (r == null) return;
      models.push(row.model);
      ratios.push(r);
      colors.push(r > 1.05 ? '#dc2626' : r < 0.95 ? '#16a34a' : '#94a3b8');
    });
    if (models.length === 0) return;

    const h2 = document.createElement('h2');
    h2.textContent = METRIC_LABELS[metric] + ' ratio (' + compareName + ' / ' + baseName + ')';
    container.appendChild(h2);

    const div = document.createElement('div');
    div.className = 'chart-container';
    div.style.height = Math.max(300, models.length * 28) + 'px';
    container.appendChild(div);

    Plotly.newPlot(div, [{
      type: 'bar',
      orientation: 'h',
      y: models,
      x: ratios,
      marker: { color: colors },
      hovertemplate: '%{y}<br>ratio: %{x:.3f}<extra></extra>',
    }], {
      paper_bgcolor: '#fff', plot_bgcolor: '#fff',
      font: { size: 11, family: 'system-ui' },
      margin: { l: 240, r: 20, t: 10, b: 40 },
      xaxis: {
        title: 'ratio (1.0 = no change)',
        zeroline: false,
        gridcolor: '#eee',
      },
      yaxis: { autorange: 'reversed', tickfont: { family: 'ui-monospace, monospace', size: 10 } },
      shapes: [{
        type: 'line', x0: 1, x1: 1, y0: -0.5, y1: models.length - 0.5,
        line: { color: '#333', width: 1.5, dash: 'dash' },
      }],
    }, { displayModeBar: false, responsive: true });
  });
}

let sortCol = null;
let sortAsc = true;

function renderTable(comparison, baseName, compareName) {
  const thead = document.querySelector('#table thead');
  const tbody = document.querySelector('#table tbody');

  // Header
  let hhtml = '<tr><th data-col="model">model</th>';
  METRICS.forEach(metric => {
    hhtml += `<th data-col="${metric}_base">${METRIC_LABELS[metric]}<br><small>${baseName}</small></th>`;
    hhtml += `<th data-col="${metric}_compare">${METRIC_LABELS[metric]}<br><small>${compareName}</small></th>`;
    hhtml += `<th data-col="${metric}_ratio">${METRIC_LABELS[metric]}<br><small>ratio</small></th>`;
  });
  hhtml += '</tr>';
  thead.innerHTML = hhtml;

  function renderRows(rows) {
    let html = '';
    // Summary row
    html += '<tr class="summary-row"><td>geometric mean</td>';
    METRICS.forEach(metric => {
      const gm = comparison.summary[metric];
      const cls = ratioClass(gm, metric);
      html += '<td></td><td></td>';
      html += `<td class="${cls}">${gm != null ? gm.toFixed(3) + 'x' : 'n/a'}</td>`;
    });
    html += '</tr>';

    rows.forEach(row => {
      html += `<tr><td>${row.model}</td>`;
      METRICS.forEach(metric => {
        const d = row[metric];
        const cls = ratioClass(d.ratio, metric);
        html += `<td>${formatValue(metric, d.base)}</td>`;
        html += `<td>${formatValue(metric, d.compare)}</td>`;
        html += `<td class="${cls}">${d.ratio != null ? d.ratio.toFixed(3) + 'x' : 'n/a'}</td>`;
      });
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  renderRows(comparison.rows);

  // Sortable columns
  thead.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) { sortAsc = !sortAsc; }
      else { sortCol = col; sortAsc = true; }
      thead.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');

      const sorted = [...comparison.rows].sort((a, b) => {
        let va, vb;
        if (col === 'model') { va = a.model; vb = b.model; }
        else {
          const [metric, which] = col.match(/^(.+)_(base|compare|ratio)$/).slice(1);
          va = a[metric]?.[which]; vb = b[metric]?.[which];
        }
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;
        if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        return sortAsc ? va - vb : vb - va;
      });
      renderRows(sorted);
    });
  });
}

function update() {
  const baseName = baseSel.value;
  const compareName = compareSel.value;
  const comparison = computeComparison(baseName, compareName);
  document.getElementById('meta').textContent =
    ALL_EXPERIMENTS.length + ' experiments · ' +
    comparison.allModels.length + ' models';
  renderSummary(comparison.summary);
  renderCharts(comparison, baseName, compareName);
  renderTable(comparison, baseName, compareName);
}

baseSel.addEventListener('change', update);
compareSel.addEventListener('change', update);
update();
</script>
</body>
</html>
