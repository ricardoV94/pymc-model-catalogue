<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>pymc-model-catalogue &mdash; benchmark dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #fff;
      color: #222;
      font-size: 13px;
    }
    header {
      padding: 10px 20px;
      border-bottom: 1px solid #eaeaea;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { margin: 0; font-size: 15px; font-weight: 600; }
    header .meta { color: #888; font-size: 11px; }
    header .links { margin-left: auto; display: flex; gap: 12px; }
    header .links a { color: #1f77b4; text-decoration: none; font-size: 12px; }
    header .links a:hover { text-decoration: underline; }
    main { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }
    .model-row {
      margin-bottom: 14px;
      display: grid;
      grid-template-columns: 200px repeat(4, 1fr);
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #f1f1f1;
      padding-bottom: 10px;
    }
    .model-row h2 {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      font-family: ui-monospace, SF Mono, Menlo, monospace;
      color: #333;
      word-break: break-all;
      line-height: 1.3;
    }
    .plot-wrap { display: flex; flex-direction: column; gap: 2px; }
    .plot-title {
      font-size: 10px;
      color: #888;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .plot { height: 80px; min-width: 0; }
    .empty {
      color: #bbb;
      font-size: 10px;
      text-align: center;
      padding: 28px 0;
    }
  </style>
</head>
<body>
<header>
  <h1>pymc-model-catalogue</h1>
  <span class="meta" id="meta"></span>
  <div class="links">
    <a href="./">default asv view</a>
  </div>
</header>
<main id="root"></main>
<script>
const PAYLOAD = {"models": ["models.BEST", "models.eight_schools_noncentered", "models_discrete.occupancy_crossbill"], "metrics": ["track_rewrite_time", "track_compile_time", "track_n_rewrites", "time_eval"], "metric_labels": {"track_rewrite_time": "rewrite_time", "track_compile_time": "compile_time", "track_n_rewrites": "n_rewrites", "time_eval": "eval"}, "metric_units": {"track_rewrite_time": "seconds", "track_compile_time": "seconds", "track_n_rewrites": "count", "time_eval": "seconds"}, "measured_count": 2, "data": {"models.BEST": {"track_compile_time": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 8.623430636999984}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 8.902630746}], "track_n_rewrites": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 1010.0}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 1010.0}], "track_rewrite_time": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 7.3195783500000005}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 7.468135072999985}], "time_eval": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 1.72588292282699e-05}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 1.7252153782851715e-05}]}, "models_discrete.occupancy_crossbill": {"track_compile_time": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 9.396223348000007}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 9.345101021999994}], "track_n_rewrites": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 168.0}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 168.0}], "track_rewrite_time": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 3.546749341000009}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 3.566059408000001}], "time_eval": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 4.268071428573503e-05}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 4.2878251712286856e-05}]}, "models.eight_schools_noncentered": {"track_compile_time": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 2.4039269280000326}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 2.3486570070000425}], "track_n_rewrites": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 290.0}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 290.0}], "track_rewrite_time": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 1.8592759489999935}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 1.7948879620000753}], "time_eval": [{"tag": "pymc-5.13.0", "hash": "7e81a983cec1c244178c34ae8f84bd2e36888e06", "value": 1.0174779569898072e-05}, {"tag": "pymc-5.14.0", "hash": "32548c8a56f91c770e6725315096a1342e2bacf8", "value": 1.036108212998477e-05}]}}};

const LAYOUT_BASE = {
  paper_bgcolor: '#fff',
  plot_bgcolor: '#fff',
  font: { color: '#222', size: 9, family: 'system-ui' },
  margin: { l: 4, r: 4, t: 2, b: 2 },
  showlegend: false,
  xaxis: { visible: false, fixedrange: true },
  yaxis: { visible: false, fixedrange: true },
};
const PLOTLY_CONFIG = { displayModeBar: false, responsive: true };

function pointsFor(model, metric) {
  const d = PAYLOAD.data[model] && PAYLOAD.data[model][metric];
  if (!d) return { x: [], y: [] };
  return {
    x: d.map(p => p.tag),
    y: d.map(p => p.value),
  };
}

function formatValue(metric, v) {
  if (metric === 'track_n_rewrites') return v.toFixed(0);
  if (v < 1e-3) return (v * 1e6).toFixed(1) + ' μs';
  if (v < 1) return (v * 1e3).toFixed(0) + ' ms';
  return v.toFixed(2) + ' s';
}

function makeSparkline(div, pts, metric) {
  if (pts.x.length === 0) {
    div.innerHTML = '<div class="empty">no data</div>';
    return;
  }
  const hoverText = pts.x.map((tag, i) =>
    `<b>${tag}</b><br>${formatValue(metric, pts.y[i])}`
  );
  Plotly.newPlot(div, [{
    x: pts.x,
    y: pts.y,
    mode: 'lines+markers',
    line: { color: '#1f77b4', width: 1.5, shape: 'linear' },
    marker: { size: 4, color: '#1f77b4' },
    hovertemplate: '%{text}<extra></extra>',
    text: hoverText,
  }], LAYOUT_BASE, PLOTLY_CONFIG);
}

function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  PAYLOAD.models.forEach(model => {
    const row = document.createElement('div');
    row.className = 'model-row';
    let html = `<h2>${model}</h2>`;
    PAYLOAD.metrics.forEach(metric => {
      html += `<div class="plot-wrap"><div class="plot-title">${PAYLOAD.metric_labels[metric]}</div><div class="plot" data-metric="${metric}"></div></div>`;
    });
    row.innerHTML = html;
    root.appendChild(row);
    row.querySelectorAll('.plot').forEach(div => {
      const metric = div.dataset.metric;
      makeSparkline(div, pointsFor(model, metric), metric);
    });
  });
}

document.getElementById('meta').textContent =
  PAYLOAD.models.length + ' models · ' +
  PAYLOAD.measured_count + ' pymc versions measured';

render();
</script>
</body>
</html>
