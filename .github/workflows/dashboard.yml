name: Custom dashboard

# Regenerate the custom dashboard HTML from whatever is currently
# published on gh-pages and push it back. Decoupled from backfill /
# benchmark so it can run against stale data — useful when iterating
# on the dashboard script without re-measuring.
#
# Triggers:
#   - manual dispatch
#   - push to main touching the generator script (regenerates on
#     every UI change without needing a fresh measurement run)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/make_dashboard.py
      - scripts/make_experiment_dashboard.py

concurrency:
  group: custom-dashboard
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone gh-pages
        env:
          REMOTE: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
        run: |
          set -euo pipefail
          rm -rf .gh-pages
          if ! git clone --quiet --branch gh-pages --depth 1 "$REMOTE" .gh-pages; then
            echo "gh-pages branch does not exist yet — nothing to regenerate"
            exit 0
          fi

      - name: Regenerate dashboard
        run: |
          set -euo pipefail
          if [ ! -f .gh-pages/index.json ]; then
            echo "no asv index.json on gh-pages — nothing to regenerate"
            exit 0
          fi
          python scripts/make_dashboard.py .gh-pages .gh-pages/dashboard.html
          if [ -d .gh-pages/experiments ]; then
            python scripts/make_experiment_dashboard.py .gh-pages .gh-pages/experiments.html
          fi

      - name: Push
        run: |
          set -euo pipefail
          [ -f .gh-pages/dashboard.html ] || exit 0
          cd .gh-pages
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard.html
          [ -f experiments.html ] && git add experiments.html
          if git diff --cached --quiet; then
            echo "dashboards unchanged — nothing to push"
            exit 0
          fi
          git commit -q -m "Regenerate dashboards"
          git pull --rebase --autostash -q origin gh-pages 2>/dev/null || true
          git push -q origin gh-pages
